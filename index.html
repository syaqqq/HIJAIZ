<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hijaiz - Belajar Bahasa Arab</title>
    
    <!-- TAMBAHAN UNTUK PWA & ICON -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#48dbfb">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden; font-family: 'Nunito', sans-serif;
            background: #87ceeb; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; user-select: none;
        }

        /* --- LATAR BELAKANG --- */
        .landscape-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: linear-gradient(to bottom, #48dbfb 0%, #a2d9ff 100%); overflow: hidden; }
        
        .bg-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.4) 2px, transparent 2px);
            background-size: 40px 40px;
            z-index: 0; pointer-events: none;
        }

        /* --- MATAHARI --- */
        .sun-container { position: absolute; top: 30px; right: 30px; width: 100px; height: 100px; z-index: 1; animation: sunSpin 20s linear infinite; }
        .sun { 
            width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #f1c40f, #f39c12); 
            border-radius: 50%; box-shadow: 0 0 30px #f1c40f;
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        .sun-rays { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150%; height: 150%; border-radius: 50%; border: 4px dashed rgba(241, 196, 15, 0.4); animation: raySpin 20s linear infinite reverse; }
        .sun-face { position: absolute; width: 100%; height: 100%; z-index: 2; }
        .sun-eye { position: absolute; top: 35%; width: 12px; height: 16px; background: #2c3e50; border-radius: 50%; animation: blink 3s infinite; }
        .sun-eye.left { left: 25%; } .sun-eye.right { right: 25%; }
        .sun-smile { position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); width: 20px; height: 10px; border-bottom: 4px solid #2c3e50; border-radius: 50%; }
        @keyframes blink { 0%, 96% { transform: scaleY(1); } 98% { transform: scaleY(0.1); } 100% { transform: scaleY(1); } }
        @keyframes sunSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(10deg); } }
        @keyframes raySpin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* --- AWAN --- */
        .cloud { 
            position: absolute; background: white; width: 100px; height: 35px; 
            border-radius: 50px; z-index: 1; opacity: 0.9; 
            animation: moveClouds linear infinite; filter: drop-shadow(0 4px 2px rgba(0,0,0,0.05));
        }
        .cloud::after, .cloud::before { content: ''; position: absolute; background: white; border-radius: 50%; }
        .cloud::after { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud::before { width: 40px; height: 40px; top: -15px; right: 15px; }
        .cloud-1 { top: 15%; left: -150px; transform: scale(1.1); animation-duration: 45s; }
        .cloud-2 { top: 25%; left: -200px; transform: scale(0.8); animation-duration: 60s; animation-delay: 5s; }
        .cloud-3 { top: 10%; left: -300px; transform: scale(0.6); animation-duration: 55s; animation-delay: 15s; }
        @keyframes moveClouds { from { left: -150px; } to { left: 110vw; } }

        /* --- ILUSTRASI MASJID --- */
        .mosque-bg {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; align-items: flex-end;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }
        .m-main {
            width: 260px; height: 160px; background: #fff8e1; border-radius: 15px 15px 0 0;
            position: relative; z-index: 2; box-shadow: inset 0 -10px 0 #ffe082;
            display: flex; justify-content: center; align-items: flex-end;
        }
        .m-dome-main {
            position: absolute; top: -110px; left: 50%; transform: translateX(-50%);
            width: 160px; height: 120px; background: radial-gradient(circle at 30% 30%, #ffd700, #ffa502);
            border-radius: 50% 50% 10% 10%; z-index: 1; box-shadow: inset -10px -5px 10px rgba(0,0,0,0.1);
        }
        .m-dome-main::after { content: ''; position: absolute; top: -35px; left: 50%; transform: translateX(-50%); width: 4px; height: 35px; background: #ffa502; }
        .m-moon { position: absolute; top: -45px; left: 50%; transform: translateX(-50%) rotate(-30deg); width: 20px; height: 20px; border-radius: 50%; border-bottom: 4px solid #ffd700; border-left: 4px solid #ffd700; }
        .m-door { width: 70px; height: 90px; background: #54a0ff; border-radius: 40px 40px 0 0; border: 5px solid #fff; position: relative; }
        .m-tower { width: 50px; height: 240px; background: #ffecb3; border-radius: 10px 10px 0 0; position: relative; z-index: 1; margin: 0 -15px; box-shadow: inset 5px 0 0 rgba(255,255,255,0.5); }
        .m-dome-small { position: absolute; top: -40px; left: -5px; width: 60px; height: 50px; background: radial-gradient(circle at 30% 30%, #ffd700, #ffa502); border-radius: 50% 50% 10% 10%; }
        .m-window { position: absolute; top: 40px; width: 30px; height: 40px; background: #54a0ff; border-radius: 20px 20px 0 0; border: 3px solid #fff; }
        .m-window.left { left: 30px; } .m-window.right { right: 30px; }

        .hill { position: absolute; bottom: -50px; border-radius: 50% 50% 0 0; }
        .hill-1 { width: 120%; height: 45%; background: linear-gradient(180deg, #badc58 0%, #6ab04c 100%); left: -10%; z-index: 4; border-top: 5px solid #a3cb38; }
        .hill-2 { width: 100%; height: 55%; background: linear-gradient(180deg, #dff9fb 0%, #c7ecee 100%); left: 20%; z-index: 1; bottom: -20px; opacity: 0.8; }
        .hill-3 { width: 130%; height: 38%; background: linear-gradient(180deg, #96c93d 0%, #009432 100%); right: -15%; z-index: 5; bottom: -80px; border-top: 5px solid #78e08f; }

        /* --- BUIH HIJAIYYAH --- */
        .bubble-container { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; overflow: hidden; }
        .bubble { 
            position: absolute; bottom: -100px; 
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9), rgba(200, 240, 255, 0.4)); 
            border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.8); 
            box-shadow: 0 4px 10px rgba(0, 150, 255, 0.2), inset 2px 2px 10px rgba(255, 255, 255, 1); 
            display: flex; justify-content: center; align-items: center; 
            color: #d63031; font-family: 'Amiri', serif; font-weight: bold; font-size: 2rem; 
            text-shadow: 2px 2px 0px white;
            animation: floatUp linear infinite; 
        }
        @keyframes floatUp { 0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-120vh) translateX(50px) rotate(20deg); opacity: 0; } }
        .b1 { left: 5%; width: 60px; height: 60px; animation-duration: 18s; animation-delay: 0s; color: #e84393; }
        .b2 { left: 15%; width: 50px; height: 50px; animation-duration: 15s; animation-delay: 5s; color: #00b894; }
        .b3 { left: 35%; width: 70px; height: 70px; animation-duration: 20s; animation-delay: 2s; color: #0984e3; }
        .b4 { left: 55%; width: 55px; height: 55px; animation-duration: 16s; animation-delay: 8s; color: #fdcb6e; }
        .b5 { left: 75%; width: 65px; height: 65px; animation-duration: 19s; animation-delay: 1s; color: #6c5ce7; }
        .b6 { left: 90%; width: 45px; height: 45px; animation-duration: 14s; animation-delay: 6s; color: #d63031; }

        /* --- ANIMASI LAIN --- */
        .hidden-page { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .confetti { position: absolute; width: 12px; height: 12px; pointer-events: none; z-index: 150; border-radius: 4px; top: -20px; }
        @keyframes fall { to { transform: translateY(110vh) translateX(20px) rotate(720deg); opacity: 0; } }
        @keyframes popUp { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        .shake-wrong { animation: shake 0.4s ease-in-out; }
        @keyframes spotlightFade { 0% { background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.95) 100%); opacity: 1; } 100% { background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7) 100%); opacity: 1; } }
        .spotlight-bg { animation: spotlightFade 3s forwards ease-in-out; }

        /* --- TAJUK HIJAIZ --- */
        .hijaiz-title-wrapper {
            position: relative;
            font-family: 'Fredoka One', cursive;
            font-size: 3.8rem;
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.15));
            z-index: 10;
            letter-spacing: 2px;
        }
        @media (min-width: 640px) {
            .hijaiz-title-wrapper { font-size: 5rem; }
        }
        .hijaiz-title-stroke {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            -webkit-text-stroke: 12px white;
            -webkit-text-fill-color: white;
            z-index: -1;
        }
        @media (min-width: 640px) {
            .hijaiz-title-stroke { -webkit-text-stroke: 16px white; }
        }
        .hijaiz-title-colors span:nth-child(1) { color: #ff6b6b; } /* H */
        .hijaiz-title-colors span:nth-child(2) { color: #feca57; } /* I */
        .hijaiz-title-colors span:nth-child(3) { color: #1dd1a1; } /* J */
        .hijaiz-title-colors span:nth-child(4) { color: #48dbfb; } /* A */
        .hijaiz-title-colors span:nth-child(5) { color: #54a0ff; } /* I */
        .hijaiz-title-colors span:nth-child(6) { color: #a29bfe; } /* Z */

        /* --- UI ELEMENTS --- */
        .clay-panel { 
            background: rgba(255, 255, 255, 0.85); border-radius: 40px; padding: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); backdrop-filter: blur(12px); border: 4px solid #74b9ff;
            position: relative; z-index: 30; width: 90%; max-width: 400px; text-align: center; 
        }
        .clay-btn { 
            width: 100%; padding: 18px; border-radius: 25px; border: none; font-family: 'Fredoka One', cursive; 
            font-size: 1.4rem; color: white; cursor: pointer; transition: all 0.2s;
            border-bottom: 6px solid rgba(0,0,0,0.1);
        }
        .clay-btn:hover { transform: translateY(-4px); filter: brightness(1.1); }
        .clay-btn:active { transform: translateY(4px); border-bottom-width: 2px; }

        .btn-green { background: #2ecc71; border-color: #27ae60; }
        .btn-red { background: #ff7675; border-color: #d63031; }
        .btn-orange { background: #fab1a0; border-color: #e17055; }
        .btn-blue { background: #74b9ff; border-color: #0984e3; }
        .btn-purple { background: #a29bfe; border-color: #6c5ce7; }
        .btn-pink { background: #fd79a8; border-color: #e84393; }
        .btn-teal { background: #55efc4; border-color: #00b894; }

        .menu-item { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; border-radius: 25px; cursor: pointer; transition: all 0.3s; height: 140px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-bottom: 6px solid rgba(0,0,0,0.1); }
        .menu-item:hover { transform: translateY(-8px); }
        .menu-icon { font-size: 3.5rem; margin-bottom: 5px; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.1)); }
        .menu-text { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: white; text-align: center; line-height: 1.1; text-transform: uppercase; }

        .detail-list { list-style: none; padding: 0; width: 100%; text-align: left; }
        .detail-list li {
            font-family: 'Nunito', sans-serif; font-size: 1.1rem; color: #2d3436; margin-bottom: 12px;
            display: flex; align-items: center; font-weight: 700; background: white; padding: 15px 20px; 
            border-radius: 15px; cursor: pointer; transition: all 0.2s; border: 2px solid #eee; border-left: 8px solid #bdc3c7;
            text-transform: uppercase;
        }
        .detail-list li:hover { transform: translateX(8px); border-left-color: #ff6b6b; }

        .menu-grid { display: grid; gap: 15px; width: 100%; margin-top: 5px; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-2x2 { grid-template-columns: repeat(2, 1fr); max-width: 600px; margin: 0 auto; }
        @media (max-width: 640px) { .menu-grid, .grid-3, .grid-2x2 { grid-template-columns: 1fr; } .menu-item { flex-direction: row; height: 80px; justify-content: flex-start; padding-left: 30px; } }

        .nav-btn { background: #ff6b6b; color: white; border-radius: 50px; padding: 12px 30px; font-family: 'Fredoka One', cursive; font-size: 1.2rem; transition: all 0.2s; border: 2px solid white; cursor: pointer; }

        /* MEMORY GAME STYLES */
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; max-width: 240px; margin: 0 auto; }
        .mem-card { aspect-ratio: 1; background: white; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: #2d3436; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-family: 'Amiri', serif; transition: all 0.2s; border-bottom: 3px solid #b2bec3; user-select: none; }
        .mem-card.hidden-card { background: #74b9ff; color: transparent; background-image: radial-gradient(circle, rgba(255,255,255,0.2) 1px, transparent 1px); background-size: 8px 8px; border-bottom: 3px solid #0984e3; }
        .mem-card.matched { background: #55efc4; color: white; border-bottom-color: #00b894; cursor: default; transform: scale(0.9); opacity: 0.7; }

        .btn-back-mini { background-color: #f1f5f9; color: #475569; padding: 6px 16px; border-radius: 50px; font-weight: 800; font-size: 0.85rem; margin-top: 12px; border-bottom: 3px solid #cbd5e1; transition: all 0.2s; cursor: pointer; }

        @media print {
            body { background: white !important; height: auto !important; overflow: visible !important; }
            .landscape-container, #musicToggleBtn, .print\:hidden { display: none !important; }
            #page-activity { position: relative !important; width: 100% !important; height: auto !important; z-index: 9999 !important; display: block !important; }
            #lembaran-print-area { box-shadow: none !important; border: none !important; max-width: 100% !important; margin: 0 auto; padding: 20px !important; }
            .border-\\[3px\\] { border-width: 3px !important; border-color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .bg-blue-50 { background-color: white !important; }
            .text-blue-600 { color: black !important; }
        }
    </style>
</head>
<body>

    <div class="landscape-container">
        <div class="bg-pattern"></div>
        <div class="rainbow"></div>
        
        <!-- MATAHARI -->
        <div class="sun-container">
            <div class="sun-rays"></div>
            <div class="sun">
                <div class="sun-face">
                    <div class="sun-eye left"></div>
                    <div class="sun-eye right"></div>
                    <div class="sun-smile"></div>
                </div>
            </div>
        </div>

        <!-- AWAN -->
        <div class="cloud cloud-1"></div><div class="cloud cloud-2"></div><div class="cloud cloud-3"></div>
        
        <!-- BUIH HURUF HIJAIYYAH -->
        <div class="bubble-container">
            <div class="bubble b1">ا</div><div class="bubble b2">ب</div><div class="bubble b3">ت</div>
            <div class="bubble b4">ث</div><div class="bubble b5">ج</div><div class="bubble b6">ح</div>
        </div>

        <!-- MASJID -->
        <div class="mosque-bg">
            <div class="m-tower"><div class="m-dome-small"></div></div>
            <div class="m-main">
                <div class="m-dome-main"><div class="m-moon"></div></div>
                <div class="m-door"></div>
                <div class="m-window left"></div>
                <div class="m-window right"></div>
            </div>
            <div class="m-tower"><div class="m-dome-small"></div></div>
        </div>
        <div class="hill hill-2"></div><div class="hill hill-1"></div><div class="hill hill-3"></div>
    </div>

    <!-- BUTANG KAWALAN MUZIK -->
    <button id="musicToggleBtn" onclick="toggleMusic()" class="absolute top-5 left-5 z-50 bg-white/60 backdrop-blur-md p-3 rounded-full shadow-lg border-2 border-white/60 text-2xl transition transform hover:scale-110 cursor-pointer" title="Buka/Tutup Muzik">
        🔊
    </button>

    <!-- UI PAGES -->
    <!-- SPLASH / MULA -->
    <div id="page-splash" class="absolute inset-0 z-40 flex flex-col w-full h-full overflow-hidden fade-in px-5 py-8 justify-center items-center">
        <!-- Tajuk Hijaiz Bersinar -->
        <div class="hijaiz-title-wrapper">
            <div class="hijaiz-title-stroke">HIJAIZ</div>
            <div class="hijaiz-title-colors">
                <span>H</span><span>I</span><span>J</span><span>A</span><span>I</span><span>Z</span>
            </div>
        </div>
        
        <!-- Butang Mula Bulat dengan Ikon Play -->
        <button onclick="playPopSound(); switchPage('page-splash', 'page-login')" 
                class="flex flex-col items-center justify-center w-40 h-40 rounded-full bg-gradient-to-br from-[#1dd1a1] to-[#2e86de] border-[5px] border-white shadow-[0_10px_25px_rgba(0,0,0,0.2),_0_0_15px_rgba(255,255,255,0.6)] hover:scale-105 active:scale-95 transition-transform duration-300 cursor-pointer relative z-50">
            <!-- Ikon Play (Tengah) -->
            <svg class="w-14 h-14 text-white ml-2 mt-1" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 4l15 8-15 8z" />
            </svg>
            <!-- Teks MULA -->
            <span class="text-white font-nunito font-black text-xl tracking-[0.15em] mt-1">MULA</span>
        </button>
    </div>

    <!-- LOGIN -->
    <div id="page-login" class="absolute inset-0 z-40 flex flex-col w-full h-full overflow-y-auto hidden-page px-5 py-8">
        <div class="m-auto w-full max-w-sm flex flex-col items-center">
            <div class="hijaiz-title-wrapper mt-4 mb-2">
                <div class="hijaiz-title-stroke">HIJAIZ</div>
                <div class="hijaiz-title-colors">
                    <span>H</span><span>I</span><span>J</span><span>A</span><span>I</span><span>Z</span>
                </div>
            </div>
            <div class="clay-panel w-full mt-2">
                <h2 class="text-[#ff6b6b] text-xl md:text-2xl mb-6 font-extrabold tracking-wide">Jom Mula Belajar!</h2>
                <form id="loginForm" onsubmit="goToHome(event)">
                    <div class="mb-4 text-left">
                        <label class="font-fredoka text-gray-500 ml-2 mb-1 block text-sm">NAMA ANDA</label>
                        <input type="text" id="username" class="w-full p-4 rounded-3xl border-2 border-gray-200 outline-none focus:border-blue-400 font-bold text-center text-lg" placeholder="Masukkan nama..." required>
                    </div>
                    <div class="mb-6 text-left">
                        <label class="font-fredoka text-gray-500 ml-2 mb-1 block text-sm">KATA LALUAN</label>
                        <input type="password" id="password" class="w-full p-4 rounded-3xl border-2 border-gray-200 outline-none focus:border-blue-400 font-bold text-center text-lg" placeholder="***" required>
                    </div>
                    <p id="login-error" class="text-red-500 text-sm font-bold hidden mb-3 text-center">Kata laluan salah! Sila cuba lagi.</p>
                    <button type="submit" class="clay-btn btn-blue">MASUK KELAS 🚀</button>
                </form>
            </div>
        </div>
    </div>

    <!-- HOME -->
    <div id="page-home" class="absolute inset-0 z-40 flex flex-col w-full h-full overflow-y-auto hidden-page px-5 py-8">
        <div class="m-auto w-full max-w-4xl flex flex-col items-center">
            <div class="w-full mb-4 text-center sm:text-left">
                <h2 class="text-white font-nunito font-bold text-lg sm:text-xl drop-shadow-md">Assalamualaikum,</h2>
                <h1 id="greeting-name" class="text-white font-fredoka text-4xl sm:text-5xl md:text-6xl drop-shadow-lg break-words leading-tight w-full">Hi, Kawan!</h1>
            </div>
            <div class="clay-panel w-full" style="max-width: 800px; padding: 25px;">
                <div class="menu-grid grid-3">
                    <div class="menu-item btn-green" onclick="playPopSound(); showActivity('Flashcard Huruf', 'Pengenalan Huruf', 'page-home')"><div class="menu-icon">📖</div> <div class="menu-text">PENGENALAN<br>HURUF</div></div>
                    <div class="menu-item btn-red" onclick="playPopSound(); showActivity('Kuiz Teka Huruf', 'KUIZ', 'page-home')"><div class="menu-icon">🤔</div> <div class="menu-text">KUIZ<br>PINTAR</div></div>
                    <div class="menu-item btn-orange" onclick="playPopSound(); showDetail('GAMES')"><div class="menu-icon">🎮</div> <div class="menu-text">GAMES<br>SERONOK</div></div>
                </div>
            </div>
            <div class="w-full max-w-4xl flex justify-between mt-4 px-2">
                <button onclick="logKeluar()" class="nav-btn !bg-red-500 !border-red-300">Log Keluar 🚪</button>
                <button onclick="playPopSound(); switchPage('page-home', 'page-extra')" class="nav-btn">Lagi Menu 👉</button>
            </div>
        </div>
    </div>

    <!-- EXTRA MENU -->
    <div id="page-extra" class="absolute inset-0 z-40 flex flex-col w-full h-full overflow-y-auto hidden-page px-5 py-8">
        <div class="m-auto w-full max-w-4xl flex flex-col items-center">
            <div class="w-full px-2 mb-4 flex justify-between items-center">
                <button onclick="playPopSound(); switchPage('page-extra', 'page-home')" class="bg-white/40 p-3 rounded-full border-2 border-white/60 text-white shadow-lg cursor-pointer">🏠</button>

        async function sendAImessage() {
            const inputEl = document.getElementById('ai-input');
            const text = inputEl.value.trim();
            if(!text) return;

            playPopSound();
            inputEl.value = '';
            
            appendChatUI(text, true);
            aiChatHistory.push({ role: "user", parts: [{ text: text }] });

            const loadingId = 'loading-' + Date.now();
            const chatBox = document.getElementById('ai-chat-box');
            chatBox.innerHTML += `
                <div id="${loadingId}" class="flex gap-2 w-full fade-in">
                    <div class="bg-white border border-gray-200 text-gray-400 p-3 rounded-2xl rounded-tl-sm text-sm font-bold max-w-[85%] shadow-sm flex items-center gap-1">
                        <span class="animate-bounce">.</span><span class="animate-bounce" style="animation-delay: 0.2s">.</span><span class="animate-bounce" style="animation-delay: 0.4s">.</span>
                    </div>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;

            const apiKey = "";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: aiChatHistory,
                systemInstruction: { parts: [{ text: "Anda adalah Hijaiz AI, pembantu maya yang mesra untuk kanak-kanak belajar bahasa Arab dan mengaji. Berikan jawapan yang ringkas, mudah difahami, gunakan emoji, dan sentiasa positif. Berikan maksud perkataan dalam bahasa melayu jika diminta. Jangan gunakan bahasa yang terlalu formal atau panjang." }] }
            };

            let retries = 5;
            let delays = [1000, 2000, 4000, 8000, 16000];
            let success = false;
            let responseText = "Maaf kawan, Hijaiz AI sedang berehat. Sila cuba lagi nanti ya! 🛠️";

            for(let i=0; i<retries; i++) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload)
                    });
                    if(res.ok) {
                        const data = await res.json();
                        responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, Hijaiz AI tak faham. Boleh terangkan lagi?";
                        success = true;
                        break;
                    }
                } catch(e) {
                }
                if(!success && i < delays.length) {
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }

            if(success) {
                aiChatHistory.push({ role: "model", parts: [{ text: responseText }] });
            } else {
                aiChatHistory.pop(); 
            }

            const loadingEl = document.getElementById(loadingId);
            if(loadingEl) loadingEl.remove();

            appendChatUI(responseText, false);
        }

        function cycleColor(el) { let state = parseInt(el.getAttribute('data-state') || '0'); state = (state + 1) % 4; el.setAttribute('data-state', state); el.className = 'w-10 h-10 rounded-xl cursor-pointer flex-shrink-0 transition-colors duration-200 border-2 flex items-center justify-center text-white text-lg font-bold'; if (state === 0) { el.classList.add('bg-gray-200', 'border-gray-300'); el.innerHTML = ''; } else if (state === 1) { el.classList.add('bg-green-400', 'border-green-500'); el.innerHTML = '✓'; } else if (state === 2) { el.classList.add('bg-yellow-400', 'border-yellow-500'); el.innerHTML = '⚠️'; } else if (state === 3) { el.classList.add('bg-red-400', 'border-red-500'); el.innerHTML = '✗'; } }

        function initMemoryGame() {
            const board = document.getElementById('memory-board'); if(!board) return; const titleEl = document.getElementById('activity-title'); if (titleEl) titleEl.innerText = "Hafal Kedudukan! 👀"; 
            const randomLetters = [...flashcardData].sort(() => 0.5 - Math.random()).slice(0, 8).map(item => item.base);
            let letters = [...randomLetters, ...randomLetters].sort(() => 0.5 - Math.random());
            let openedCards = []; let matchedPairs = 0; let canClick = false; 
            letters.forEach((char) => {
                const card = document.createElement('div'); card.className = 'mem-card'; card.innerText = char; card.dataset.val = char;
                card.onclick = () => {
                    if (!canClick || card.classList.contains('matched') || openedCards.includes(card)) return;
                    card.classList.remove('hidden-card'); card.innerText = char; openedCards.push(card);
                    if (openedCards.length === 2) {
                        canClick = false; const [card1, card2] = openedCards;
                        if (card1.dataset.val === card2.dataset.val) { setTimeout(() => { card1.classList.add('matched'); card2.classList.add('matched'); openedCards = []; matchedPairs++; canClick = true; if (matchedPairs === 8) showGameWin('Padankan Huruf'); }, 500); } 
                        else { card1.classList.add('shake-wrong'); card2.classList.add('shake-wrong'); setTimeout(() => { card1.classList.remove('shake-wrong'); card2.classList.remove('shake-wrong'); card1.classList.add('hidden-card'); card1.innerText = ''; card2.classList.add('hidden-card'); card2.innerText = ''; openedCards = []; canClick = true; }, 800); }
                    }
                }; board.appendChild(card);
            });
            setTimeout(() => { if(!document.getElementById('memory-board')) return; if (titleEl) titleEl.innerText = "Padankan Huruf 🎮"; const allCards = board.querySelectorAll('.mem-card'); allCards.forEach(card => { card.classList.add('hidden-card'); card.innerText = ''; }); canClick = true; }, 3000);
        }

        function showGameWin(gameName) {
            const contentDiv = document.getElementById('activity-content');
            contentDiv.innerHTML = `<div class="fixed inset-0 z-[100] flex items-center justify-center spotlight-bg px-4 pointer-events-none"><div class="flex flex-col items-center w-full max-w-[320px] px-6 py-8 animate-pop text-center bg-white/90 backdrop-blur-md rounded-[2.5rem] shadow-2xl border-4 border-emerald-400 pointer-events-auto"><div class="absolute -top-10 w-20 h-20 bg-white rounded-full flex items-center justify-center text-4xl shadow-lg border-4 border-emerald-50 animate-bounce">🎉</div><h2 class="text-3xl font-fredoka text-emerald-500 mt-6 mb-1">SYABAS!</h2><p class="text-gray-600 font-bold mb-6 text-sm">Hebat sangat!</p><div class="flex gap-3 w-full"><button onclick="showActivity('${gameName}', 'GAMES', returnToPage)" class="flex-1 bg-emerald-500 text-white py-3 rounded-2xl font-bold shadow-[0_4px_0_#059669] text-sm">🔄 Main Lagi</button><button onclick="backToDetail()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-2xl font-bold shadow-[0_4px_0_#9ca3af] text-sm">🏠 Tutup</button></div></div></div>`; fireConfetti();
        }

        // --- NEW GAMES LOGIC ---
        // 1. Padankan Gambar
        let matchSelectedLeft = null; let matchSelectedRight = null; let matchPairsLeft = 0;

        function initMatchPictureGame() {
            const container = document.getElementById('match-pic-container');
            const titleEl = document.getElementById('activity-title');
            if(titleEl) titleEl.innerText = "Padankan Gambar 🧩";

            let animals = [...animalData].sort(() => 0.5 - Math.random()).slice(0, 4);
            let leftItems = [...animals].sort(() => 0.5 - Math.random());
            let rightItems = [...animals].sort(() => 0.5 - Math.random());
            matchPairsLeft = 4; matchSelectedLeft = null; matchSelectedRight = null;

            let html = `<div class="flex w-full max-w-[320px] gap-4 mb-4 mt-2">
                <div class="flex flex-col gap-3 flex-1" id="match-left-col">
                    ${leftItems.map(a => `<button onclick="selectMatchItem(this, '${a.arabic}', 'left')" class="match-btn-left bg-white p-3 rounded-2xl border-b-4 border-blue-200 shadow-sm text-3xl font-amiri text-blue-600 transition-all outline-none active:translate-y-1">${a.arabic}</button>`).join('')}
                </div>
                <div class="flex flex-col gap-3 flex-1" id="match-right-col">
                    ${rightItems.map(a => `<button onclick="selectMatchItem(this, '${a.arabic}', 'right')" class="match-btn-right bg-white p-3 rounded-2xl border-b-4 border-orange-200 shadow-sm transition-all flex flex-col items-center justify-center outline-none active:translate-y-1"><span class="text-4xl drop-shadow-md">${a.icon}</span><span class="text-[0.65rem] font-bold text-gray-600 font-nunito mt-1 uppercase">${a.malay}</span></button>`).join('')}
                </div>
            </div>
            <button onclick="backToDetail()" class="btn-back-mini mt-2">⬅️ Kembali</button>`;
            container.innerHTML = html;
        }

        function selectMatchItem(btn, val, side) {
            if(btn.classList.contains('matched') || btn.classList.contains('selected')) return;
            if(side === 'left') {
                if(matchSelectedLeft) matchSelectedLeft.btn.classList.remove('ring-4', 'ring-blue-400', 'selected');
                matchSelectedLeft = {btn, val};
                btn.classList.add('ring-4', 'ring-blue-400', 'selected');
            } else {
                if(matchSelectedRight) matchSelectedRight.btn.classList.remove('ring-4', 'ring-orange-400', 'selected');
                matchSelectedRight = {btn, val};
                btn.classList.add('ring-4', 'ring-orange-400', 'selected');
            }

            if(matchSelectedLeft && matchSelectedRight) {
                if(matchSelectedLeft.val === matchSelectedRight.val) {
                    matchSelectedLeft.btn.classList.replace('bg-white', 'bg-green-400');
                    matchSelectedLeft.btn.classList.add('text-white', 'matched', 'opacity-60', 'scale-95');
                    matchSelectedLeft.btn.classList.remove('ring-4', 'ring-blue-400', 'selected', 'text-blue-600');
                    
                    matchSelectedRight.btn.classList.replace('bg-white', 'bg-green-400');
                    matchSelectedRight.btn.classList.add('text-white', 'matched', 'opacity-60', 'scale-95');
                    matchSelectedRight.btn.classList.remove('ring-4', 'ring-orange-400', 'selected');

                    matchSelectedLeft = null; matchSelectedRight = null; matchPairsLeft--;
                    if(matchPairsLeft === 0) setTimeout(() => showGameWin('Padankan Gambar'), 600);
                } else {
                    let lBtn = matchSelectedLeft.btn; let rBtn = matchSelectedRight.btn;
                    lBtn.classList.add('shake-wrong', 'bg-red-200'); rBtn.classList.add('shake-wrong', 'bg-red-200');
                    setTimeout(() => {
                        lBtn.classList.remove('shake-wrong', 'ring-4', 'ring-blue-400', 'selected', 'bg-red-200');
                        rBtn.classList.remove('shake-wrong', 'ring-4', 'ring-orange-400', 'selected', 'bg-red-200');
                    }, 500);
                    matchSelectedLeft = null; matchSelectedRight = null;
                }
            }
        }

        // 2. Teka Maksud Arab
        function initAnimalMeaningQuiz() { quizScore = 0; quizCurrentQ = 0; loadAnimalMeaningQuestion(); }

        function loadAnimalMeaningQuestion() {
            isAnswering = false; const container = document.getElementById('meaning-quiz-container');
            let correctObj = animalData[Math.floor(Math.random() * animalData.length)];
            let options = [correctObj];
            while(options.length < 4) {
                let w = animalData[Math.floor(Math.random() * animalData.length)];
                if(!options.includes(w)) options.push(w);
            }
            options.sort(() => Math.random() - 0.5);

            container.innerHTML = `
                <div class="w-full flex flex-col items-center">
                    <div class="w-full flex justify-between mb-3 px-1"><span class="bg-white px-2.5 py-1 rounded-full font-bold text-[0.65rem] text-gray-600 shadow-sm border border-gray-100">Tahap: ${quizCurrentQ+1}/${quizTotalQ}</span><span class="bg-emerald-500 text-white px-2.5 py-1 rounded-full font-bold text-[0.65rem] border-2 border-white shadow-sm">Skor: ${quizScore}</span></div>
                    <div class="flex flex-col items-center mb-6 w-full justify-center">
                        <span class="text-xs font-bold text-gray-500 bg-white px-4 py-1.5 rounded-full shadow-sm mb-3 inline-block border border-gray-100">APAKAH MAKSUD PERKATAAN INI?</span>
                        <div class="text-5xl font-amiri text-white bg-gradient-to-r from-emerald-400 to-teal-500 px-12 py-5 rounded-[2rem] border-4 border-emerald-100 shadow-xl mb-2 tracking-wide">${correctObj.arabic}</div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 w-full max-w-[280px] mb-4">
                        ${options.map(opt => `<button onclick="checkMeaningAnswer(this, '${opt.malay}', '${correctObj.malay}')" class="flex flex-col items-center justify-center bg-white p-4 rounded-2xl shadow-md border-b-4 border-gray-300 active:translate-y-1 active:border-b-0 hover:bg-gray-50 transition-colors">
                            <span class="text-[0.95rem] font-bold text-gray-700">${opt.malay}</span>
                        </button>`).join('')}
                    </div>
                    <button onclick="backToDetail()" class="btn-back-mini mt-1">⬅️ Kembali</button>
                </div>`;
        }

        function checkMeaningAnswer(btn, sel, cor) {
            if(isAnswering) return; isAnswering = true;
            if(sel === cor) { quizScore += 10; btn.classList.replace('bg-white', 'bg-green-400'); btn.classList.add('text-white', '!border-green-600'); btn.classList.remove('text-gray-700', 'hover:bg-gray-50', 'border-gray-300'); }
            else { btn.classList.replace('bg-white', 'bg-red-400'); btn.classList.add('text-white', 'shake-wrong', '!border-red-600'); btn.classList.remove('text-gray-700', 'hover:bg-gray-50', 'border-gray-300'); }
            quizCurrentQ++; setTimeout(() => { if(quizCurrentQ < quizTotalQ) loadAnimalMeaningQuestion(); else showMeaningResult(); }, 800);
        }

        function showMeaningResult() {
            const container = document.getElementById('meaning-quiz-container');
            let m = "Cemerlang!"; let e = "🌟"; let c = "text-emerald-500";
            if (quizScore === 100) { m = "Sempurna!"; e = "🏆"; c = "text-yellow-500"; } else if (quizScore < 50) { m = "Cuba Lagi!"; e = "💪"; c = "text-red-500"; }
            container.innerHTML = `
                <div class="fixed inset-0 z-[100] flex items-center justify-center spotlight-bg px-4 pointer-events-none">
                    <div class="flex flex-col items-center w-full max-w-[320px] px-6 py-8 animate-pop text-center bg-white/90 backdrop-blur-md rounded-[2.5rem] shadow-2xl border-4 border-white pointer-events-auto">
                        <div class="absolute -top-10 w-20 h-20 bg-white rounded-full flex items-center justify-center text-4xl shadow-lg border-4 border-emerald-50 animate-bounce">${e}</div>
                        <h2 class="text-3xl font-fredoka ${c} mt-6 mb-1">${m}</h2>
                        <div class="relative w-32 h-32 flex items-center justify-center mb-6"><svg class="absolute inset-0 w-full h-full transform -rotate-90"><circle cx="64" cy="64" r="58" stroke="#f1f5f9" stroke-width="10" fill="none" /><circle cx="64" cy="64" r="58" stroke="currentColor" stroke-width="10" fill="none" stroke-dasharray="364" stroke-dashoffset="${364-(364*quizScore/100)}" class="${c}" stroke-linecap="round" /></svg><span class="text-4xl font-black text-gray-800 absolute">${quizScore}</span></div>
                        <div class="flex gap-3 w-full"><button onclick="initAnimalMeaningQuiz()" class="flex-1 bg-green-500 text-white py-3 rounded-2xl font-bold shadow-[0_4px_0_#16a34a] text-sm">🔄 Semula</button><button onclick="backToDetail()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-2xl font-bold shadow-[0_4px_0_#9ca3af] text-sm">✖️ Tutup</button></div>
                    </div>
                </div>`;
            if (quizScore >= 50) fireConfetti();
        }

        // 3. Isyarat Hijaiyah
        function initGestureGame() { quizScore = 0; quizCurrentQ = 0; loadGestureQuestion(); }

        function loadGestureQuestion() {
            isAnswering = false; const container = document.getElementById('gesture-game-container');
            let correctObj = flashcardData[Math.floor(Math.random() * flashcardData.length)];
            let options = [correctObj];
            while(options.length < 4) {
                let w = flashcardData[Math.floor(Math.random() * flashcardData.length)];
                if(!options.includes(w)) options.push(w);
            }
            options.sort(() => Math.random() - 0.5);

            let signGraphic = getSignHTML(correctObj.base);
            let largeSignGraphic = signGraphic.replace(/75px/g, '140px').replace('text-4xl', 'text-7xl');

            container.innerHTML = `
                <div class="w-full flex flex-col items-center">
                    <div class="w-full flex justify-between mb-3 px-1"><span class="bg-white px-2.5 py-1 rounded-full font-bold text-[0.65rem] text-gray-600 shadow-sm border border-gray-100">Tahap: ${quizCurrentQ+1}/${quizTotalQ}</span><span class="bg-pink-500 text-white px-2.5 py-1 rounded-full font-bold text-[0.65rem] border-2 border-white shadow-sm">Skor: ${quizScore}</span></div>
                    <div class="flex flex-col items-center mb-5 w-full justify-center">
                        <span class="text-xs font-bold text-gray-500 bg-white px-4 py-1.5 rounded-full shadow-sm mb-3 inline-block border border-gray-100">INI HURUF APA?</span>
                        <div class="p-3 bg-white rounded-[2rem] shadow-xl border-4 border-pink-200 flex justify-center items-center transform transition-transform hover:scale-105">${largeSignGraphic}</div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 w-full max-w-[260px] mb-3">
                        ${options.map(opt => `<button onclick="checkGestureAnswer(this, '${opt.base}', '${correctObj.base}')" class="flex items-center justify-center bg-white h-[80px] text-[3.5rem] font-amiri rounded-2xl shadow-md border-b-4 border-gray-300 active:translate-y-1 active:border-b-0 text-pink-600 hover:bg-pink-50 transition-colors">${opt.base}</button>`).join('')}

        function checkGestureAnswer(btn, sel, cor) {
            if(isAnswering) return; isAnswering = true;

        }

        function showGestureResult() {
            const container = document.getElementById('gesture-game-container');
            let m = "Mantap!"; let e = "🙌"; let c = "text-pink-500";
            if (quizScore === 100) { m = "Sempurna!"; e = "🏆"; c = "text-yellow-500"; } else if (quizScore < 50) { m = "Cuba Lagi!"; e = "💪"; c = "text-red-500"; }
            container.innerHTML = `
                <div class="fixed inset-0 z-[100] flex items-center justify-center spotlight-bg px-4 pointer-events-none">
                    <div class="flex flex-col items-center w-full max-w-[320px] px-6 py-8 animate-pop text-center bg-white/90 backdrop-blur-md rounded-[2.5rem] shadow-2xl border-4 border-white pointer-events-auto">
                        <div class="absolute -top-10 w-20 h-20 bg-white rounded-full flex items-center justify-center text-4xl shadow-lg border-4 border-pink-50 animate-bounce">${e}</div>
                        <h2 class="text-3xl font-fredoka ${c} mt-6 mb-1">${m}</h2>
                        <div class="relative w-32 h-32 flex items-center justify-center mb-6"><svg class="absolute inset-0 w-full h-full transform -rotate-90"><circle cx="64" cy="64" r="58" stroke="#f1f5f9" stroke-width="10" fill="none" /><circle cx="64" cy="64" r="58" stroke="currentColor" stroke-width="10" fill="none" stroke-dasharray="364" stroke-dashoffset="${364-(364*quizScore/100)}" class="${c}" stroke-linecap="round" /></svg><span class="text-4xl font-black text-gray-800 absolute">${quizScore}</span></div>
                        <div class="flex gap-3 w-full"><button onclick="initGestureGame()" class="flex-1 bg-green-500 text-white py-3 rounded-2xl font-bold shadow-[0_4px_0_#16a34a] text-sm">🔄 Semula</button><button onclick="backToDetail()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-2xl font-bold shadow-[0_4px_0_#9ca3af] text-sm">✖️ Tutup</button></div>
                    </div>
                </div>`;
            if (quizScore >= 50) fireConfetti();
        }

        // --- AUTH ---
        function goToHome(e) { 
            e.preventDefault(); playPopSound(); const userIn = document.getElementById('username').value.trim(); const passIn = document.getElementById('password').value;
            if (appData[userIn]) { if (appData[userIn].password !== passIn) { document.getElementById('login-error').classList.remove('hidden'); return; } } 
            else { appData[userIn] = { password: passIn, murid: [], animalProgress: {} }; }
            currentUser = userIn; senaraiMurid = appData[currentUser].murid || []; switchPage('page-login', 'page-home'); document.getElementById('greeting-name').innerText = `Hi, ${currentUser}!`; 
        }
        
        function logKeluar() { playPopSound(); currentUser = null; senaraiMurid = []; document.getElementById('username').value = ''; document.getElementById('password').value = ''; switchPage('page-home', 'page-login'); }

        // Daftar Service Worker untuk membolehkan PWA dipasang (install)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(registration => console.log('Service Worker berjaya didaftarkan!'))
                .catch(err => console.log('Pendaftaran Service Worker gagal:', err));
            });
            
            // Segarkan halaman secara automatik jika ada versi cache/sw.js yang baharu (selari dengan self.skipWaiting)
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
